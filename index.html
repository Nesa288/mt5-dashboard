<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MT5 Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" onerror="this.remove()"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060c14;
  --glass:rgba(255,255,255,0.04);
  --glass-border:rgba(255,255,255,0.08);
  --glass-hover:rgba(255,255,255,0.07);
  --text:#e2eeff;
  --muted:#4a6a8a;
  --mono:'JetBrains Mono','Courier New',monospace;
  --sans:'Space Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{background:var(--bg);font-family:var(--sans);color:var(--text);overflow-x:hidden;min-height:100vh}
button{cursor:pointer;font-family:var(--sans)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* ── ANIMATED BACKGROUND ── */
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.app-wrap{position:relative;z-index:1}

/* ── GLASSMORPHISM BASE ── */
.glass{
  background:var(--glass);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  border-radius:16px;
}
.glass-strong{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;
}

/* ── ANIMATIONS ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 8px var(--glow-c)}50%{box-shadow:0 0 20px var(--glow-c),0 0 40px var(--glow-c)}}
@keyframes slide-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes slide-in-left{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes count-glow{0%{text-shadow:none}50%{text-shadow:0 0 20px currentColor}100%{text-shadow:none}}
@keyframes border-flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.anim-slide-up{animation:slide-up .4s cubic-bezier(.16,1,.3,1) both}
.anim-slide-up-1{animation:slide-up .4s .05s cubic-bezier(.16,1,.3,1) both}
.anim-slide-up-2{animation:slide-up .4s .10s cubic-bezier(.16,1,.3,1) both}
.anim-slide-up-3{animation:slide-up .4s .15s cubic-bezier(.16,1,.3,1) both}
.anim-slide-up-4{animation:slide-up .4s .20s cubic-bezier(.16,1,.3,1) both}
.anim-fade{animation:fade-in .3s ease both}

/* ── HEADER ── */
.header{
  background:rgba(6,12,20,0.7);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-logo{display:flex;align-items:center;gap:10px}
.header-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#f0b429,#ff6b35);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#000;box-shadow:0 0 16px rgba(240,180,41,0.4)}
.header-title{font-size:14px;font-weight:700;letter-spacing:.04em}
.header-sub{font-size:10px;color:var(--muted);margin-top:1px;font-family:var(--mono)}
.header-time{font-size:11px;color:var(--muted);font-family:var(--mono);background:var(--glass);border:1px solid var(--glass-border);padding:4px 10px;border-radius:20px}

/* ── BOT CARDS ── */
.bot-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 12px}
.bot-card{
  border-radius:16px;padding:14px 12px;text-align:left;
  background:var(--glass);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  overflow:hidden;min-width:0;
  transition:all .25s cubic-bezier(.16,1,.3,1);
  position:relative;
}
.bot-card::before{
  content:'';position:absolute;inset:0;border-radius:16px;
  background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,0.03) 100%);
  pointer-events:none;
}
.bot-card.active{border-color:var(--bot-ac);background:rgba(255,255,255,0.07);box-shadow:0 0 24px var(--bot-glow),inset 0 0 24px rgba(255,255,255,0.02)}
.bot-card:hover{transform:translateY(-3px) scale(1.01);background:var(--glass-hover);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.bot-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex-shrink:0}
.bot-name{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bot-balance{font-size:15px;font-weight:700;color:#e8f4fd;margin-bottom:1px;font-family:var(--mono)}
.bot-profit{font-size:9px;color:#4ade80;margin-bottom:8px;font-family:var(--mono)}
.status-pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 9px;font-size:9px;font-weight:600}
.status-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:10px;padding:4px 12px 10px}
.divider-bar{width:3px;height:20px;border-radius:2px}
.divider-name{font-size:12px;font-weight:700;letter-spacing:.04em}
.divider-line{flex:1;height:1px;background:var(--glass-border)}

/* ── TABS ── */
.tab-bar{display:flex;gap:4px;padding:0 12px 12px;flex-wrap:wrap}
.tab-btn{
  border-radius:10px;padding:7px 16px;font-size:11px;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;
  border:1px solid transparent;background:transparent;color:var(--muted);
  transition:all .2s;
}
.tab-btn:hover{color:var(--text);background:var(--glass)}
.tab-btn.active{background:var(--tab-bg);border-color:var(--tab-border);color:var(--tab-color);box-shadow:0 0 12px var(--tab-glow)}

/* ── CONTENT ── */
.content{padding:0 12px 14px}

/* ── METRIC CARDS ── */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.metric-card{
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:14px;padding:14px 12px;
  overflow:hidden;position:relative;
  transition:transform .3s cubic-bezier(.16,1,.3,1), box-shadow .3s ease, border-color .3s ease;
  transform-style:preserve-3d;
  will-change:transform;
  cursor:default;
  transition:box-shadow .3s, border-color .3s;
}
/* Rotating border glow sweep */
.metric-card::before{
  content:'';position:absolute;inset:-1px;border-radius:15px;
  background:conic-gradient(from var(--angle,0deg), transparent 0%, var(--mc,#f0b429) 10%, transparent 20%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  padding:1px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:0;
}
/* Inner cursor shine */
.metric-card::after{
  content:'';position:absolute;inset:0;border-radius:14px;
  background:radial-gradient(circle 80px at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.07) 0%, transparent 70%);
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:1;
}
.metric-card:hover::after{opacity:1}
.metric-card:hover::before{opacity:1}
.metric-card .metric-label,.metric-card .metric-value,.metric-card .metric-sub{position:relative;z-index:2}
.metric-label{color:var(--muted);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.metric-value{font-weight:700;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.metric-sub{color:var(--muted);font-size:9px;margin-top:4px;font-family:var(--mono)}

/* ── GENERIC CARD ── */
.card{
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:14px;padding:16px;margin-bottom:10px;
  position:relative;overflow:hidden;
  transform-style:preserve-3d;
  transition:box-shadow .3s, border-color .3s;
  will-change:transform;
}
.card::after{
  content:'';position:absolute;inset:0;border-radius:14px;
  background:radial-gradient(circle 120px at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.05) 0%, transparent 70%);
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:1;
}
.card:hover::after{opacity:1}
.card:hover{border-color:rgba(255,255,255,0.14);box-shadow:0 8px 40px rgba(0,0,0,.25)}
.card>*{position:relative;z-index:2}
.card-title{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}

/* ── EQUITY SPARKLINE ── */
.sparkline-wrap{margin-bottom:6px;border-radius:8px;overflow:hidden}

/* ── WIN BAR ── */
.winbar{display:flex;height:24px;border-radius:8px;overflow:hidden;gap:2px}
.winbar-win{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;background:linear-gradient(90deg,#14532d,#4ade80)}
.winbar-loss{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;background:linear-gradient(90deg,#450a0a,#f87171)}

/* ── TRADES ── */
.trade-row{
  background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:12px;overflow:hidden;margin-bottom:8px;
  border:1px solid var(--glass-border);
  position:relative;
  transition:transform .25s cubic-bezier(.16,1,.3,1), box-shadow .25s, border-color .25s, background .2s;
  will-change:transform;
}
.trade-row::after{
  content:'';position:absolute;inset:0;border-radius:12px;
  background:radial-gradient(circle 100px at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.06) 0%, transparent 70%);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.trade-row:hover{background:var(--glass-hover);transform:translateX(3px);border-color:rgba(255,255,255,0.12);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.trade-row:hover::after{opacity:1}
.trade-inner{padding:12px 14px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}
.dir-badge{border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;font-family:var(--mono)}
.trade-entry{font-size:11px;color:var(--text);font-family:var(--mono)}
.trade-meta{font-size:9px;color:var(--muted);margin-top:2px}
.trade-pnl{font-size:13px;font-weight:700;text-align:right;font-family:var(--mono)}
.chart-btn{font-size:9px;border-radius:10px;padding:3px 8px;background:transparent;border:1px solid;margin-top:4px;display:block;margin-left:auto;transition:all .2s}
.chart-btn:hover{background:rgba(255,255,255,0.05)}

/* ── TV CHART ── */
.tv-container{border-radius:12px;overflow:hidden;border:1px solid var(--glass-border);background:#080e14;margin-top:2px}
.tv-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;flex-wrap:wrap;gap:6px;background:rgba(0,0,0,0.3)}
.tv-live{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80;animation:pulse 1.5s infinite;flex-shrink:0}
.tf-bar{display:flex;gap:3px}
.tf-btn{border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;border:1px solid var(--glass-border);background:transparent;color:var(--muted);transition:all .2s;font-family:var(--mono)}
.tf-btn.active{background:var(--tf-bg);border-color:var(--tf-border);color:var(--tf-color)}
.tv-frame{width:100%;height:320px;display:block;border:none}
.trade-levels{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 12px;background:rgba(0,0,0,0.2)}
.level-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:8px;padding:8px 6px;text-align:center}
.level-label{font-size:8px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.level-value{font-size:12px;font-weight:700;font-family:var(--mono)}

/* ── MARKET ── */
.market-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.row-item{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}

/* ── SETUP ── */
.setup-card{border-radius:14px;padding:18px;margin-bottom:10px}
.condition-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.cond-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:2px;transition:all .3s}
.risk-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:11px;font-family:var(--mono)}

.footer{text-align:center;padding:16px;font-size:10px;color:rgba(255,255,255,0.15);font-family:var(--mono)}

/* ── GLOW LINES ── */
.glow-line{height:1px;background:linear-gradient(90deg,transparent,var(--line-c),transparent);margin:0 12px 10px;opacity:0.4}
</style>
</head>

// ─── PARTICLES ───────────────────────────────────────────────────────────────
(function(){
  const canvas=document.getElementById("bg-canvas");
  const ctx=canvas.getContext("2d");
  let W,H,particles=[];

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  }
  resize();
  window.addEventListener("resize",resize);

  // Gradient orbs
  const orbs=[
    {x:.15,y:.2,r:.35,c:"rgba(240,180,41,0.06)"},
    {x:.85,y:.7,r:.4,c:"rgba(96,165,250,0.06)"},
    {x:.5,y:.5,r:.5,c:"rgba(74,222,128,0.03)"},
  ];

  // Floating particles
  for(let i=0;i<55;i++){
    particles.push({
      x:Math.random()*1,y:Math.random()*1,
      vx:(Math.random()-.5)*.0003,vy:(Math.random()-.5)*.0003,
      r:Math.random()*1.5+.5,
      opacity:Math.random()*.4+.1,
      c:["#f0b429","#60a5fa","#4ade80","#a78bfa"][Math.floor(Math.random()*4)],
    });
  }

  // Connection lines between nearby particles
  function draw(){
    ctx.clearRect(0,0,W,H);

    // Orbs
    orbs.forEach(o=>{
      const grd=ctx.createRadialGradient(o.x*W,o.y*H,0,o.x*W,o.y*H,o.r*Math.max(W,H));
      grd.addColorStop(0,o.c);
      grd.addColorStop(1,"transparent");
      ctx.fillStyle=grd;
      ctx.fillRect(0,0,W,H);
    });

    // Particles
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=1; if(p.x>1)p.x=0;
      if(p.y<0)p.y=1; if(p.y>1)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
      ctx.fillStyle=p.c;
      ctx.globalAlpha=p.opacity;
      ctx.fill();
    });

    // Connection lines
    ctx.globalAlpha=1;
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=(particles[i].x-particles[j].x)*W;
        const dy=(particles[i].y-particles[j].y)*H;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){
          ctx.beginPath();
          ctx.moveTo(particles[i].x*W,particles[i].y*H);
          ctx.lineTo(particles[j].x*W,particles[j].y*H);
          ctx.strokeStyle="rgba(255,255,255,"+(0.06*(1-dist/120))+")";
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

function fmt(n,d=2){return Number(n).toLocaleString("en",{minimumFractionDigits:d,maximumFractionDigits:d});}

function sparklineSVG(vals,color){
  const min=Math.min(...vals),max=Math.max(...vals),w=300,h=52;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*w},${h-((v-min)/(max-min||1))*h}`).join(" ");
  const id="sg"+color.replace(/[^a-z0-9]/gi,"");
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;display:block">
    <defs>
      <linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="0,${h} ${pts} ${w},${h}" fill="url(#${id})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${vals.map((v,i)=>(i/(vals.length-1))*w).pop()}" cy="${h-((vals[vals.length-1]-min)/(max-min||1))*h}" r="3" fill="${color}" style="filter:drop-shadow(0 0 4px ${color})"/>
  </svg>`;
}

// Count-up animation
function countUp(el,target,decimals=2,prefix="",suffix=""){
  const start=performance.now();
  const duration=800;
  function step(now){
    const p=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-p,4);
    const val=target*ease;
    el.textContent=prefix+fmt(val,decimals)+suffix;
    if(p<1)requestAnimationFrame(step);
    else el.textContent=prefix+fmt(target,decimals)+suffix;
  }
  requestAnimationFrame(step);
}

// ─── CARD HOVER EFFECTS (event delegation — works after every render) ────────
function initCardEffects(){
  const bot = BOTS.find(b=>b.id===activeBot);
  const acColor = bot ? bot.ac : '#f0b429';

  document.querySelectorAll('.metric-card,.card,.bot-card,.trade-row').forEach(card=>{
    // Avoid double-binding
    if(card._tiltBound) return;
    card._tiltBound = true;

    card.style.setProperty('--mc', acColor);

    // ── Border sweep animation
    let angle = 0, sweepRaf = null, hovered = false;

    function animSweep(){
      if(!hovered) return;
      angle = (angle + 2.5) % 360;
      card.style.setProperty('--angle', angle+'deg');
      sweepRaf = requestAnimationFrame(animSweep);
    }

    // ── Smooth lerp tilt
    let tRotX=0, tRotY=0, cRotX=0, cRotY=0, tiltRaf=null;
    const isBotCard   = card.classList.contains('bot-card');
    const isTradeRow  = card.classList.contains('trade-row');
    const strength    = isBotCard ? 5 : isTradeRow ? 3 : 12;
    const tz          = isBotCard ? 3 : isTradeRow ? 2 : 8;

    function lerpStep(){
      cRotX += (tRotX - cRotX) * 0.10;
      cRotY += (tRotY - cRotY) * 0.10;
      if(isTradeRow){
        card.style.transform = `perspective(800px) rotateX(${cRotX}deg) rotateY(${cRotY}deg)`;
      } else {
        card.style.transform = `perspective(700px) rotateX(${cRotX}deg) rotateY(${cRotY}deg) translateZ(${tz}px)`;
      }
      if(Math.abs(tRotX-cRotX)>.02 || Math.abs(tRotY-cRotY)>.02){
        tiltRaf = requestAnimationFrame(lerpStep);
      }
    }

    function lerpReset(){
      tRotX=0; tRotY=0;
      function step(){
        cRotX += (0-cRotX)*0.09;
        cRotY += (0-cRotY)*0.09;
        card.style.transform = `perspective(700px) rotateX(${cRotX}deg) rotateY(${cRotY}deg) translateZ(0px)`;
        if(Math.abs(cRotX)>.02 || Math.abs(cRotY)>.02) requestAnimationFrame(step);
        else card.style.transform = '';
      }
      step();
    }

    card.addEventListener('mouseenter', ()=>{
      hovered = true;
      animSweep();
    });

    card.addEventListener('mouseleave', ()=>{
      hovered = false;
      cancelAnimationFrame(sweepRaf);
      card.style.setProperty('--angle','0deg');
      lerpReset();
    });

    card.addEventListener('mousemove', e=>{
      const r = card.getBoundingClientRect();
      const x = e.clientX - r.left;
      const y = e.clientY - r.top;
      const cx = r.width  / 2;
      const cy = r.height / 2;

      // Tilt based on cursor position relative to center
      tRotX = ((y - cy) / cy) * -strength;
      tRotY = ((x - cx) / cx) *  strength;

      cancelAnimationFrame(tiltRaf);
      lerpStep();

      // Shine spotlight
      card.style.setProperty('--mx', (x/r.width*100)+'%');
      card.style.setProperty('--my', (y/r.height*100)+'%');
    });
  });
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
render();
setTimeout(initCardEffects, 80);
</script>
</body>
